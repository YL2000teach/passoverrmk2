<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>חפש את האפיקומן — ילדים 🫓</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #b45309;
  --cream: #fdf6ec;
  --cream2: #f5ede0;
  --brown: #2d1a0e;
  --brown2: #6b4226;
  --purple: #7c3aed;
  --purple2: #6d28d9;
  --green: #15803d;
  --border: #e0ccb0;
  --shadow: rgba(45,26,14,0.13);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Heebo', sans-serif;
  background: var(--cream);
  min-height: 100vh;
  color: var(--brown);
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse at 10% 20%, rgba(180,83,9,0.07) 0%, transparent 60%),
    radial-gradient(ellipse at 90% 80%, rgba(124,58,237,0.06) 0%, transparent 60%);
  pointer-events: none; z-index: 0;
}

.screen { display: none; position: relative; z-index: 1; }
.screen.active { display: flex; flex-direction: column; align-items: center; min-height: 100vh; }

/* ══ HOME ══ */
#screen-home {
  justify-content: center;
  padding: 40px 20px 60px;
  gap: 32px;
}
.home-header { text-align: center; }
.home-title { font-size: 2.2rem; font-weight: 900; color: var(--gold); letter-spacing: -1px; }
.home-sub { font-size: 0.95rem; color: var(--brown2); font-weight: 700; margin-top: 4px; }

.home-card {
  width: 100%; max-width: 360px;
  background: #fff;
  border: 2px solid var(--border);
  border-radius: 20px;
  padding: 28px 24px;
  box-shadow: 0 6px 28px var(--shadow);
  display: flex; flex-direction: column; gap: 20px;
}
.card-label {
  font-size: 0.82rem; font-weight: 700; color: var(--gold);
  text-align: center; letter-spacing: 0.5px;
}
.code-input {
  font-family: 'Heebo', sans-serif;
  font-size: 1.8rem; font-weight: 900;
  width: 100%; height: 62px;
  border: 2.5px solid var(--border);
  border-radius: 12px; padding: 0 16px;
  outline: none; text-align: center;
  background: var(--cream); color: var(--brown);
  letter-spacing: 5px;
  transition: border-color 0.15s, box-shadow 0.15s;
  direction: ltr;
}
.code-input:focus { border-color: var(--purple); box-shadow: 0 0 0 3px rgba(124,58,237,0.15); }
.code-input.wrong { border-color: #dc2626; background: #fef2f2; animation: shake 0.3s ease; }
.code-feedback { font-size: 0.88rem; font-weight: 700; min-height: 18px; text-align: center; color: #dc2626; }

.btn-enter {
  font-family: 'Heebo', sans-serif; font-weight: 700; font-size: 1.05rem;
  padding: 13px; border-radius: 12px; border: none;
  background: var(--purple); color: #fff; cursor: pointer;
  transition: background 0.15s, transform 0.1s;
}
.btn-enter:hover { background: var(--purple2); transform: translateY(-2px); }
.btn-enter:active { transform: scale(0.97); }

/* Progress */
.progress-section { width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 10px; }
.progress-header {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 0.85rem; font-weight: 700; color: var(--brown2);
}
.progress-bar-bg {
  background: #e8d8c0; border-radius: 99px; height: 12px; overflow: hidden;
  border: 1.5px solid #d4b896;
}
.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold), #f59e0b);
  border-radius: 99px;
  transition: width 0.7s cubic-bezier(.4,0,.2,1);
}
.progress-stations {
  display: flex; gap: 6px; justify-content: center; flex-wrap: wrap;
}
.station-dot {
  width: 28px; height: 28px; border-radius: 50%;
  border: 2px solid var(--border);
  background: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.7rem; font-weight: 900; color: #b39070;
  transition: background 0.3s, border-color 0.3s;
}
.station-dot.done { background: var(--green); border-color: var(--green); color: #fff; }

/* ══ SUCCESS OVERLAY ══ */
#success-overlay {
  display: none;
  position: fixed; inset: 0; z-index: 200;
  background: rgba(15,10,5,0.55);
  align-items: center; justify-content: center;
  animation: fadeIn 0.2s ease;
}
#success-overlay.show { display: flex; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.success-card {
  background: #fff;
  border: 3px solid #86efac;
  border-radius: 24px;
  padding: 40px 32px;
  max-width: 340px; width: 90%;
  text-align: center;
  display: flex; flex-direction: column; align-items: center; gap: 12px;
  animation: popUp 0.35s cubic-bezier(.175,.885,.32,1.275);
}
@keyframes popUp {
  from { transform: scale(0.7); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}
.success-emoji { font-size: 3.5rem; }
.success-title { font-size: 1.7rem; font-weight: 900; color: var(--green); }
.success-sub { font-size: 0.95rem; color: var(--brown2); line-height: 1.5; }

/* ══ WIN OVERLAY ══ */
#win-overlay {
  display: none;
  position: fixed; inset: 0; z-index: 300;
  background: rgba(15,10,5,0.7);
  align-items: center; justify-content: center;
}
#win-overlay.show { display: flex; }
.win-card {
  background: #fff;
  border: 3px solid var(--gold);
  border-radius: 28px;
  padding: 48px 36px;
  max-width: 360px; width: 90%;
  text-align: center;
  display: flex; flex-direction: column; align-items: center; gap: 14px;
  animation: popUp 0.4s cubic-bezier(.175,.885,.32,1.275);
}
.win-emoji { font-size: 4rem; }
.win-title { font-size: 2rem; font-weight: 900; color: var(--gold); }
.win-text { font-size: 1rem; color: var(--brown2); line-height: 1.6; }
.btn-win {
  font-family: 'Heebo', sans-serif; font-weight: 700; font-size: 1rem;
  padding: 12px 28px; border-radius: 12px; border: none;
  background: var(--gold); color: #fff; cursor: pointer;
  transition: background 0.15s;
}
.btn-win:hover { background: #92400e; }

/* ══ PUZZLE ══ */
#screen-puzzle { padding: 0; gap: 0; }
.puzzle-topbar {
  width: 100%; background: #fff; border-bottom: 2px solid var(--border);
  padding: 10px 16px; display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px var(--shadow); flex-shrink: 0;
}
.topbar-label { font-size: 0.95rem; font-weight: 900; color: var(--gold); }
.btn-back {
  font-family: 'Heebo', sans-serif; font-weight: 700; font-size: 0.88rem;
  padding: 7px 16px; border-radius: 8px; border: 2px solid var(--border);
  background: transparent; color: var(--brown2); cursor: pointer; transition: background 0.15s;
}
.btn-back:hover { background: var(--cream2); }
#puzzle-iframe { width: 100%; border: none; min-height: calc(100vh - 54px); flex: 1; }

@keyframes shake {
  0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)}
}
</style>
</head>
<body>

<!-- ══ HOME ══ -->
<div id="screen-home" class="screen active">
  <div class="home-header">
    <div class="home-title">🫓 האפיקומן</div>
    <div class="home-sub">הכניסו את קוד התחנה שמצאתם</div>
  </div>

  <div class="home-card">
    <div class="card-label">קוד תחנה</div>
    <input type="text" class="code-input" id="code-input"
      placeholder="- - - - - -"
      inputmode="numeric" autocomplete="off" autocorrect="off" spellcheck="false"
      maxlength="8"
    />
    <div class="code-feedback" id="code-feedback"></div>
    <button class="btn-enter" onclick="checkCode()">כניסה ◀</button>
  </div>

  <div class="progress-section">
    <div class="progress-header">
      <span>התקדמות</span>
      <span id="progress-count">0 / 10</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
    </div>
    <div class="progress-stations" id="progress-stations"></div>
  </div>
</div>

<!-- ══ PUZZLE ══ -->
<div id="screen-puzzle" class="screen">
  <div class="puzzle-topbar">
    <button class="btn-back" onclick="goHome()">← חזרה</button>
    <div class="topbar-label" id="topbar-label"></div>
    <div style="width:64px"></div>
  </div>
  <iframe id="puzzle-iframe" title="חידה"></iframe>
</div>

<!-- ══ SUCCESS OVERLAY ══ -->
<div id="success-overlay">
  <div class="success-card">
    <div class="success-emoji">🎉</div>
    <div class="success-title">כל הכבוד!</div>
    <div class="success-sub" id="success-sub">התחנה הושלמה!</div>
  </div>
</div>

<!-- ══ WIN OVERLAY ══ -->
<div id="win-overlay">
  <div class="win-card">
    <div class="win-emoji">🏆</div>
    <div class="win-title">מצאתם את האפיקומן!</div>
    <div class="win-text">🎉 כל הכבוד! עברתם את כל 10 התחנות!<br><br>שלחו צילום מסך למספר <strong>054-5552021</strong><br>וכתבו את שמות המשתתפים.<br><br>חג פסח שמח! 🌿</div>
    <button class="btn-win" onclick="document.getElementById('win-overlay').classList.remove('show')">🫓 סיום</button>
  </div>
</div>

<script>
// ══════════════════════════════
// STATION DATA
// ══════════════════════════════
const STATIONS = [
  { id:1,  name:'תחנה 1',  icon:'🐱', code:'1357', completionType:'imageAnswer' },
  { id:2,  name:'תחנה 2',  icon:'🦋', code:'2489', completionType:'imageAnswer' },
  { id:3,  name:'תחנה 3',  icon:'🔢', code:'9876', completionType:'imageAnswer' },
  { id:4,  name:'תחנה 4',  icon:'🎨', code:'1982', completionType:'imageAnswer' },
  { id:5,  name:'תחנה 5',  icon:'💻', code:'2026', completionType:'imageAnswer' },
  { id:6,  name:'תחנה 6',  icon:'🐦', code:'1493', completionType:'imageAnswer' },
  { id:7,  name:'תחנה 7',  icon:'🌸', code:'1234', completionType:'imageAnswer' },
  { id:8,  name:'תחנה 8',  icon:'🥕', code:'4334', completionType:'imageAnswer' },
  { id:9,  name:'תחנה 9',  icon:'🫓', code:'2222', completionType:'imageAnswer' },
  { id:10, name:'תחנה 10', icon:'📜', code:'1470', completionType:'imageAnswer' }
];

// ══════════════════════════════
// STATE
// ══════════════════════════════
const STORAGE_KEY = 'afikoman_kids_v1';
let state = { completed: [] };
let currentStation = null;

function loadState() {
  try { const r = localStorage.getItem(STORAGE_KEY); if (r) state = JSON.parse(r); } catch(e) {}
}
function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
function isCompleted(id) { return state.completed.includes(id); }
function markCompleted(id) {
  if (!isCompleted(id)) { state.completed.push(id); saveState(); }
}

// ══════════════════════════════
// SCREENS
// ══════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
  window.scrollTo(0, 0);
}

function goHome() {
  showScreen('home');
  renderProgress();
  const inp = document.getElementById('code-input');
  inp.value = '';
  inp.className = 'code-input';
  document.getElementById('code-feedback').textContent = '';
  setTimeout(() => inp.focus(), 150);
}

// ══════════════════════════════
// CODE CHECK
// ══════════════════════════════
document.getElementById('code-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkCode();
});
document.getElementById('code-input').addEventListener('input', () => {
  document.getElementById('code-input').className = 'code-input';
  document.getElementById('code-feedback').textContent = '';
});

function checkCode() {
  const inp = document.getElementById('code-input');
  const val = inp.value.trim();
  const fb = document.getElementById('code-feedback');
  if (!val) { fb.textContent = 'הכניסו קוד'; return; }

  const st = STATIONS.find(s => s.code === val);
  if (!st) {
    inp.className = 'code-input wrong';
    setTimeout(() => inp.className = 'code-input', 320);
    fb.textContent = 'קוד לא נכון — נסו שוב 🔍';
    inp.value = '';
    setTimeout(() => inp.focus(), 100);
    return;
  }

  currentStation = st;
  launchPuzzle();
}

// ══════════════════════════════
// PUZZLE
// ══════════════════════════════
function launchPuzzle() {
  document.getElementById('topbar-label').textContent =
    `${currentStation.icon} תחנה ${currentStation.id} — ${currentStation.name}`;

  const iframe = document.getElementById('puzzle-iframe');
  iframe.srcdoc = buildStationHtml(currentStation);
  showScreen('puzzle');
}

// Called from inside iframe via postMessage
window.addEventListener('message', e => {
  if (e.data && e.data.type === 'STATION_COMPLETE') {
    handleCompletion();
  }
});

function handleCompletion() {
  markCompleted(currentStation.id);
  renderProgress();

  const sub = document.getElementById('success-sub');
  sub.textContent = 'תחנה הושלמה!';
  document.getElementById('success-overlay').classList.add('show');

  setTimeout(() => {
    document.getElementById('success-overlay').classList.remove('show');
    goHome();
    if (state.completed.length === STATIONS.length) {
      setTimeout(() => document.getElementById('win-overlay').classList.add('show'), 400);
    }
  }, 2200);
}

// ══════════════════════════════
// PROGRESS
// ══════════════════════════════
function renderProgress() {
  const n = state.completed.length;
  const pct = Math.round(n / STATIONS.length * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-count').textContent = n + ' / ' + STATIONS.length;

  const container = document.getElementById('progress-stations');
  container.innerHTML = '';
  STATIONS.forEach(st => {
    const dot = document.createElement('div');
    dot.className = 'station-dot' + (isCompleted(st.id) ? ' done' : '');
    dot.textContent = isCompleted(st.id) ? '✓' : st.id;
    dot.title = st.name;
    container.appendChild(dot);
  });
}

// ══════════════════════════════
// INIT
// ══════════════════════════════
loadState();
renderProgress();
setTimeout(() => document.getElementById('code-input').focus(), 200);

// ══════════════════════════════════════════════════════
// BUILD STATION HTML — each station sends postMessage
// on completion
// ══════════════════════════════════════════════════════
function buildStationHtml(st) {
  const postMsg = `parent.postMessage({type:'STATION_COMPLETE'},'*');`;

  if (st.id === 1) return station1Html(postMsg);
  if (st.id === 2) return station2Html(postMsg);
  if (st.id === 3) return station3Html(postMsg);
  if (st.id === 4) return station4Html(postMsg);
  if (st.id === 5) return station5Html(postMsg);
  if (st.id === 6) return station6Html(postMsg);
  if (st.id === 7) return station7Html(postMsg);
  if (st.id === 8) return station8Html(postMsg);
  if (st.id === 9) return station9Html(postMsg);
  if (st.id === 10) return station10Html(postMsg);
  return '<p>תחנה לא נמצאה</p>';
}

// ─────────────────────────────────────────────────────
// HELPER — builds a simple image+answer station
// ─────────────────────────────────────────────────────
function buildImageStation(img, answers, postMsg) {
  const answersJson = JSON.stringify(answers);
  return `<!DOCTYPE html><html lang="he" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><style>@import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap');*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Heebo',sans-serif;background:#fdf6ec;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px 16px 40px;gap:20px}#image-wrap{width:100%;max-width:480px;border-radius:18px;overflow:hidden;border:3px solid #e0d8cc;box-shadow:0 6px 28px rgba(0,0,0,.12);background:#f5efe3}#image-wrap img{width:100%;height:auto;display:block}#answer-wrap{display:flex;flex-direction:column;align-items:center;gap:12px;width:100%;max-width:340px}#answer-input{font-family:'Heebo',sans-serif;font-size:1.5rem;font-weight:700;width:100%;height:58px;border:2.5px solid #d4b896;border-radius:14px;padding:0 18px;outline:none;text-align:center;background:#fff;color:#2d1a0e;transition:border-color .15s,box-shadow .15s}#answer-input:focus{border-color:#7c3aed;box-shadow:0 0 0 3px rgba(124,58,237,.15)}#answer-input.correct{border-color:#16a34a;background:#f0fdf4;color:#15803d}#answer-input.wrong{border-color:#dc2626;background:#fef2f2;animation:shake .28s ease}@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}#btn-check{font-family:'Heebo',sans-serif;font-weight:700;font-size:1.05rem;padding:13px 36px;border-radius:12px;border:none;background:#7c3aed;color:#fff;cursor:pointer;width:100%;transition:background .15s,transform .1s}#btn-check:hover{background:#6d28d9;transform:translateY(-2px)}#btn-check:active{transform:scale(.97)}#feedback{font-size:1rem;font-weight:700;min-height:24px;text-align:center;color:#78716c}#feedback.success{color:#16a34a;font-size:1.15rem}#feedback.error{color:#dc2626}#btn-reset{font-family:'Heebo',sans-serif;font-weight:700;font-size:.85rem;padding:8px 22px;border-radius:10px;border:2px solid #d4b896;background:#fff;color:#78716c;cursor:pointer}</style></head><body><div id="image-wrap"><img src="${img}" alt="חידה"></div><div id="answer-wrap"><input type="text" id="answer-input" placeholder="כתבו את התשובה" autocomplete="off" autocorrect="off" spellcheck="false"><button id="btn-check">בדיקה ✓</button><div id="feedback"></div><button id="btn-reset">↺ נסו שוב</button></div><script>const ANSWERS=${answersJson};const inp=document.getElementById('answer-input'),fb=document.getElementById('feedback');function normalize(s){return s.trim().toLowerCase()}inp.addEventListener('keydown',e=>{if(e.key==='Enter')check()});inp.addEventListener('input',()=>{inp.classList.remove('correct','wrong');fb.textContent='';fb.className=''});function check(){const val=normalize(inp.value);if(!val){fb.textContent='כתבו תשובה';fb.className='error';return}if(ANSWERS.some(a=>normalize(a)===val)){inp.classList.add('correct');fb.textContent='🎉 נכון! כל הכבוד!';fb.className='success';setTimeout(()=>{${postMsg}},900)}else{inp.classList.add('wrong');setTimeout(()=>{inp.classList.remove('wrong')},320);fb.textContent='לא מדויק — נסו שוב';fb.className='error';inp.value='';inp.focus()}}document.getElementById('btn-check').addEventListener('click',check);document.getElementById('btn-reset').addEventListener('click',()=>{inp.value='';inp.classList.remove('correct','wrong');fb.textContent='';fb.className='';inp.focus()});inp.focus();<\/script></body></html>`;
}

function station1Html(postMsg)  { return buildImageStation('pic11.jpg', ['חתול'], postMsg); }
function station2Html(postMsg)  { return buildImageStation('pic12.jpg', ['פרפר'], postMsg); }
function station3Html(postMsg)  { return buildImageStation('pic13.jpg', ['2','שתיים'], postMsg); }
function station4Html(postMsg)  { return buildImageStation('pic14.jpg', ['כחול'], postMsg); }
function station5Html(postMsg)  { return buildImageStation('pic15.jpg', ['מחשב'], postMsg); }
function station6Html(postMsg)  { return buildImageStation('pic16.jpg', ['ציפור'], postMsg); }
function station7Html(postMsg)  { return buildImageStation('pic17.jpg', ['פרח'], postMsg); }
function station8Html(postMsg)  { return buildImageStation('pic18.jpg', ['גזר'], postMsg); }
function station9Html(postMsg)  { return buildImageStation('pic19.jpg', ['חמץ'], postMsg); }
function station10Html(postMsg) { return buildImageStation('pic20.jpg', ['משה'], postMsg); }

</script>
</body>
</html>
